version: '3.8'

services:
  # Redis - Message broker and cache
  redis:
    image: redis:7-alpine
    container_name: notifygate-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - notifygate-network

  # Notification Gateway API
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: notifygate-api
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - RATE_LIMIT_PER_MINUTE=10
      - IDEMPOTENCY_TTL=86400
      - QUEUE_CONCURRENCY=5
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - notifygate-network
    restart: unless-stopped

volumes:
  redis_data:
    driver: local

networks:
  notifygate-network:
    driver: bridge
